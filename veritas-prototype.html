const { useState, useEffect, useCallback, useMemo } = React;

const CARDS_DATA = [{"id":"MARY_001","t":"Why Does Mary Matter at All?","obj":"Mary isn\u2019t important. She was just a vessel. Why do Catholics make such a big deal about her?","tv":"Luke 11:27\u201328","tvt":"Luke 11:27\u201328 \u2013 Jesus elevates obedience but does not diminish Mary\u2019s blessedness.","t1s":"Mary matters because God chose her, honored her, and involved her uniquely in salvation history.","t1v":"Luke 1:28; Luke 1:48","t1vt":"Luke 1:28 \u2013 'Full of grace.' Luke 1:48 \u2013 'All generations will call me blessed.'","t2s":"Mary\u2019s importance comes from God\u2019s choice and grace. Scripture highlights her unique role in salvation. Honoring her reflects God\u2019s own honor and always leads to Christ, never away.","t2e":"Scripture shows Mary as uniquely chosen, \u201cfull of grace,\u201d and blessed among women. Honoring her doesn\u2019t add to Christ but highlights what He has done in her. As the new Eve and Mother of the Church, she helps us receive Jesus more deeply, not replace Him.","t3d":"If Scripture says all generations will call Mary blessed, why should Catholics refrain?","cat":"Mary & Saints & Images","tags":["Protestant","Evangelical","Baptist","Secular"],"ccc":"484\u2013507","diff":2,"pts":20,"tier":"Core","age":"Teen","skill":"Maryology; Christology"},{"id":"MARY_002","t":"Mary Is Not God","obj":"Catholics treat Mary like a goddess. Isn\u2019t that idolatry?","tv":"Exodus 20:3; Matthew 4:10","tvt":"Ex 20:3 \u2013 No other gods. Mt 4:10 \u2013 Worship God alone.","t1s":"Catholics honor Mary, not worship her.","t1v":"Luke 1:43; Luke 1:48","t1vt":"Luke 1:43 \u2013 Mother of my Lord. Luke 1:48 \u2013 All generations call her blessed.","t2s":"Catholics honor Mary because God honored her first. Honor is not worship. Mary always points to Christ and reflects His grace, never replaces Him. Scripture itself commands future generations to recognize her blessedness.","t2e":"Catholics do not worship Mary as God. Worship (latria) belongs to God alone; Mary receives honor (dulia) because of her relationship to Jesus. Just as we honor biblical heroes, we honor the one whom God chose as Mother of His Son, without confusing her with Him.","t3d":"If God honors Mary, why shouldn\u2019t Christians?","cat":"Mary & Saints & Images","tags":["Protestant","Evangelical","JW","Muslim"],"ccc":"487\u2013507; 971","diff":2,"pts":20,"tier":"Core","age":"Teen","skill":"Maryology; Worship"},{"id":"MARY_003","t":"Mother of God","obj":"Mary didn\u2019t exist before God, so how can she be the Mother of God?","tv":"Luke 2:48","tvt":"Luke 2:48 \u2013 Mary acknowledges Jesus as her son, not denying His divinity.","t1s":"Mary is mother of the divine Person Jesus.","t1v":"Luke 1:43; John 1:14","t1vt":"Luke 1:43 \u2013 Mother of my Lord. John 1:14 \u2013 The Word became flesh.","t2s":"The title \u201cMother of God\u201d protects Christ\u2019s divinity. Mary bore the divine Person, not merely His human nature. The title preserves the truth that Jesus is one divine Person with two natures.","t2e":"\u201cMother of God\u201d defends who Jesus is, not who Mary is. Jesus is one divine Person with both a human and a divine nature. Since Mary is mother of that one Person, she is rightly called Mother of God, without meaning she caused His divinity or existed before Him.","t3d":"If Jesus is God and Mary is His mother, what title fits better?","cat":"Mary & Saints & Images","tags":["Protestant","Evangelical","JW","Muslim"],"ccc":"495; 466","diff":3,"pts":30,"tier":"Core","age":"Teen","skill":"Maryology; Christology"},{"id":"MARY_004","t":"Did Mary Need a Savior?","obj":"If Mary was sinless, why did she need a Savior?","tv":"Luke 1:47","tvt":"Luke 1:47 \u2013 Mary rejoices in God her Savior.","t1s":"Mary was saved by prevention through Christ.","t1v":"Luke 1:28","t1vt":"Luke 1:28 \u2013 \u201cFull of grace,\u201d indicating divine action in advance.","t2s":"Mary needed a Savior like all humans. Christ saved her preventively, preserving her from sin beforehand. Preventive grace is still salvation and magnifies Christ\u2019s power more completely.","t2e":"Mary rejoicing in \u201cGod my Savior\u201d proves she was saved by Christ, not that she was sinful. The Church teaches she was preserved from sin in advance by His grace, like someone kept from falling into a pit, rather than rescued after already being trapped in it.","t3d":"Is preventing sin a lesser or greater act of salvation than cleansing it?","cat":"Mary & Saints & Images","tags":["Protestant","Evangelical"],"ccc":"490\u2013493","diff":3,"pts":30,"tier":"Core","age":"Teen","skill":"Maryology; Grace"},{"id":"MARY_005","t":"Did Jesus Rebuke Mary?","obj":"Jesus pushed Mary aside at the wedding at Cana.","tv":"John 2:4","tvt":"John 2:4 \u2013 \u201cWoman\u201d is a respectful title, not rejection.","t1s":"Jesus never rejects Mary; He performs His first miracle at her request.","t1v":"John 2:5; Luke 1:38","t1vt":"John 2:5 \u2013 Do whatever He tells you. Luke 1:38 \u2013 Mary\u2019s obedience.","t2s":"Jesus\u2019s reply is not a rebuke. \u201cWoman\u201d is respectful, and He immediately performs His first miracle at Mary\u2019s request. Cana demonstrates her intercession and her role in leading disciples to Christ.","t2e":"At Cana, Jesus is not insulting His Mother; \u201cWoman\u201d is a respectful title echoing Eve and the new creation. His apparent hesitation highlights Mary\u2019s faith and intercession. The miracle that follows shows her role in leading others to His command: \u201cDo whatever He tells you.\u201d","t3d":"Why would Jesus perform a miracle if He were rejecting her intervention?","cat":"Mary & Saints & Images","tags":["Protestant","Evangelical"],"ccc":"2618; 967","diff":3,"pts":30,"tier":"Core","age":"Teen","skill":"Maryology; Scripture"},{"id":"SACRAMENTS_001","t":"Is Baptism Only a Symbol?","obj":"Baptism is symbolic, not regenerative.","tv":"Romans 6:3","tvt":"Rom 6:3 \u2013 Baptized into Christ\u2019s death.","t1s":"Baptism unites us to Christ and imparts new life.","t1v":"John 3:5; Acts 22:16","t1vt":"Jn 3:5 \u2013 Born of water and Spirit. Acts 22 \u2013 Wash away sins.","t2s":"Scripture speaks of baptism as rebirth, cleansing, and incorporation into Christ.","t2e":"Scripture consistently describes baptism as doing something, not merely illustrating something. Jesus links it to new birth, Paul to dying and rising with Christ, and Peter says baptism now saves you. A sacrament is a sign that truly confers the grace it signifies by Christ\u2019s power.","t3d":"If baptism is symbolic, why does Scripture say it washes away sin?","cat":"Baptism","tags":["Protestant","Baptist"],"ccc":"1213\u20131220","diff":3,"pts":30,"tier":"Core","age":"Adult Beginner","skill":"Sacraments; Scripture"},{"id":"SACRAMENTS_002","t":"Should Infants Be Baptized?","obj":"Babies cannot believe, so baptism is invalid.","tv":"Mark 16:16","tvt":"Mk 16:16 \u2013 Believe and be baptized.","t1s":"Baptism is covenantal, not dependent on intellectual maturity.","t1v":"Acts 2:39; Col 2:11\u201312","t1vt":"Acts 2 \u2013 Promise for children. Col 2 \u2013 Baptism replaces circumcision.","t2s":"Grace precedes understanding; baptism incorporates infants into God\u2019s family.","t2e":"Infants share in Adam\u2019s fallen condition and need Christ\u2019s grace. Throughout Scripture, God includes children in His covenants, and the New Testament shows whole households baptized. Faith is first borne by the Church and parents, then personally owned as the child matures, without making baptism ineffective.","t3d":"If infants were excluded, why were they included in the old covenant?","cat":"Baptism","tags":["Baptist","Evangelical"],"ccc":"1250\u20131252","diff":3,"pts":30,"tier":"Core","age":"Adult Beginner","skill":"Sacraments; Scripture"},{"id":"SACRAMENTS_004","t":"Is the Eucharist Only a Symbol?","obj":"Jesus spoke metaphorically\u2014no Real Presence.","tv":"John 6:63","tvt":"Jn 6:63 \u2013 The flesh profits nothing.","t1s":"Jesus insisted repeatedly on consuming His Body and Blood.","t1v":"John 6:53\u201355; 1 Cor 10:16","t1vt":"Jn 6 \u2013 My flesh is true food. 1 Cor \u2013 Participation in Body and Blood.","t2s":"Jesus calls the Eucharist His Body and Blood, not a symbol.","t2e":"Jesus doesn\u2019t say, \u201cThis represents my body.\u201d He says, \u201cThis is my body\u2026 this is my blood.\u201d Paul warns that unworthy reception profanes Christ\u2019s Body, which only makes sense if He is truly present. The early Church unanimously taught Real Presence, not a mere symbol.","t3d":"If Jesus were symbolic, why did disciples leave over this teaching?","cat":"Eucharist","tags":["Protestant","Evangelical"],"ccc":"1322\u20131330","diff":4,"pts":40,"tier":"Intermediate","age":"Adult Intermediate","skill":"Eucharistic theology"},{"id":"SACRAMENTS_005","t":"Do Catholics \u2018Re-sacrifice\u2019 Christ?","obj":"Mass repeats the sacrifice of Jesus.","tv":"Hebrews 10:10","tvt":"Heb 10:10 \u2013 Christ sacrificed once for all.","t1s":"The Mass makes the one sacrifice present, not repeated.","t1v":"1 Cor 11:26; Hebrews 7:25","t1vt":"1 Cor \u2013 Proclaim His death. Heb 7 \u2013 Christ intercedes eternally.","t2s":"The Mass makes Christ\u2019s one sacrifice present; it doesn\u2019t repeat Calvary.","t2e":"Jesus\u2019 sacrifice on the Cross is once for all. At Mass, that same sacrifice is made present sacramentally, not repeated. Scripture shows God re\u2011presenting covenant events to new generations. The early Church described the Eucharist as sacrifice flowing from Christ\u2019s one offering.","t3d":"If Mass repeats Christ\u2019s sacrifice, why does Scripture command its proclamation?","cat":"Eucharist","tags":["Protestant","Reformed"],"ccc":"1362\u20131372","diff":4,"pts":40,"tier":"Intermediate","age":"Adult Intermediate","skill":"Eucharistic theology"},{"id":"SACRAMENTS_006","t":"Why Confess to a Priest?","obj":"Only God forgives sin\u2014priests are unnecessary.","tv":"1 John 1:9","tvt":"1 Jn 1:9 \u2013 Confess to God.","t1s":"Christ gave priests authority to forgive sins.","t1v":"John 20:21\u201323; James 5:16","t1vt":"Jn 20 \u2013 Sins forgiven or retained. Jas 5 \u2013 Confess to one another.","t2s":"Confession channels Christ\u2019s forgiveness through His ministers.","t2e":"Priests exercise the authority Christ entrusted.","t3d":"If confession is unnecessary, why did Jesus empower His apostles to forgive?","cat":"Confession","tags":["Protestant","Evangelical"],"ccc":"1440\u20131463","diff":3,"pts":30,"tier":"Core","age":"Adult Beginner","skill":"Confession; Scripture"},{"id":"SACRAMENTS_008","t":"Is Marriage Just a Civil Contract?","obj":"Marriage is legal, not sacramental.","tv":"Genesis 2:24","tvt":"Gen 2:24 \u2013 The two become one flesh.","t1s":"Christ elevated marriage to a sacrament.","t1v":"Matthew 19:6; Eph 5:31\u201332","t1vt":"Mt 19 \u2013 What God joins. Eph 5 \u2013 Marriage reflects Christ and the Church.","t2s":"Marriage is a covenantal sacrament symbolizing divine union.","t2e":"Grace transforms natural marriage.","t3d":"If marriage is merely civil, why does Scripture call it a mystery of Christ?","cat":"Marriage","tags":["Secular","Protestant"],"ccc":"1601\u20131617","diff":3,"pts":30,"tier":"Core","age":"Adult Beginner","skill":"Marriage; Sacraments"},{"id":"SACRAMENTS_010","t":"Is Anointing Only for the Dying?","obj":"Last rites are only for imminent death.","tv":"James 5:14","tvt":"Jas 5:14 \u2013 Call the elders for anointing.","t1s":"Anointing is for spiritual and physical strengthening.","t1v":"Mark 6:13; James 5:15","t1vt":"Mk 6 \u2013 They anointed the sick. Jas 5 \u2013 Prayer saves and raises.","t2s":"The sacrament strengthens, heals, and forgives.","t2e":"Not limited to the moment of death.","t3d":"If anointing is only for death, why does Scripture use it for healing?","cat":"Anointing","tags":["Protestant","Secular"],"ccc":"1511\u20131523","diff":3,"pts":30,"tier":"Core","age":"Adult Beginner","skill":"Healing; Sacraments"},{"id":"SACRAMENTS_011","t":"Why Only Men in Holy Orders?","obj":"Gender exclusion is sexist and unbiblical.","tv":"Galatians 3:28","tvt":"Gal 3:28 \u2013 No male or female in Christ.","t1s":"Christ chose male apostles and the Church follows His example.","t1v":"Luke 6:12\u201316; 1 Tim 3:1\u20132","t1vt":"Lk 6 \u2013 Jesus selects apostles. 1 Tim \u2013 Bishop is male.","t2s":"Order reflects Christ\u2019s spousal role to the Church.","t2e":"Equality of dignity, distinction of roles.","t3d":"If priesthood is human invention, why no female apostles?","cat":"Holy Orders","tags":["Protestant","Secular"],"ccc":"1577\u20131585","diff":4,"pts":40,"tier":"Intermediate","age":"Adult Intermediate","skill":"Holy Orders; Ecclesiology"},{"id":"SACRAMENTS_003","t":"Is Confirmation \u2018Made Up\u2019?","obj":"Confirmation has no biblical foundation.","tv":"Acts 8:17","tvt":"Acts 8:17 \u2013 They laid hands and received the Spirit.","t1s":"Scripture shows a distinct apostolic act imparting the Spirit.","t1v":"Hebrews 6:2; Acts 19:6","t1vt":"Heb 6 \u2013 Laying on of hands is foundational. Acts 19 \u2013 Spirit given through hands.","t2s":"Confirmation strengthens baptismal grace and the Spirit\u2019s gifts.","t2e":"Apostolic practice shows a second strengthening rite.","t3d":"If confirmation is invented, why does Hebrews list laying on of hands as foundational?","cat":"Confirmation","tags":["Protestant","Non-denominational"],"ccc":"1285\u20131314","diff":3,"pts":30,"tier":"Core","age":"Adult Beginner","skill":"Sacraments; Scripture"},{"id":"SALVATION_001","t":"Justification by Faith Alone?","obj":"We are justified by faith alone. Works play no role in salvation.","tv":"Romans 3:28; Romans 4:5","tvt":"Rom 3:28 \u2013 A man is justified by faith apart from works of the law. Rom 4:5 \u2013 Faith is credited as righteousness.","t1s":"Paul rejects works of the Mosaic law, not obedient faith.","t1v":"James 2:24; Galatians 5:6","t1vt":"Jas 2:24 \u2013 A man is justified by works and not by faith alone. Gal 5:6 \u2013 Faith working through love.","t2s":"Paul condemns works of the Mosaic law, not Christian obedience. Catholics affirm salvation by grace through faith, but a living faith must express itself in love. Scripture directly denies \u2018faith alone\u2019 and presents justification as ongoing and transformative.","t2e":"Justification involves grace, faith, and cooperation in love.","t3d":"If Scripture says \u2018not by faith alone,\u2019 why do Protestants affirm the opposite?","cat":"Salvation","tags":["Protestant","Reformed","Evangelical"],"ccc":"1987\u20132029","diff":3,"pts":30,"tier":"Core","age":"Adult Beginner","skill":"Scripture basic; Hermeneutics"},{"id":"SALVATION_002","t":"Are Works \u2018Filthy Rags\u2019?","obj":"Human works are worthless; even our righteous acts are filthy rags.","tv":"Isaiah 64:6","tvt":"Isa 64:6 \u2013 All our righteous acts are like filthy rags.","t1s":"Isaiah describes unrepentant Israel, not grace-filled believers.","t1v":"Philippians 2:12\u201313; Ephesians 2:10","t1vt":"Phil 2:12\u201313 \u2013 God works in us. Eph 2:10 \u2013 Created for good works.","t2s":"Isaiah condemns hypocritical, unrepentant ritualism\u2014not Spirit-empowered obedience. In Christ, works are God\u2019s own work in us and therefore pleasing to Him. Scripture repeatedly affirms good works as part of God\u2019s saving plan.","t2e":"Grace makes works pleasing to God.","t3d":"If works are worthless, why does Scripture say God prepared them for us to walk in?","cat":"Salvation","tags":["Protestant","Fundamentalist"],"ccc":"2006\u20132011","diff":2,"pts":20,"tier":"Core","age":"Adult Beginner","skill":"Scripture basic"},{"id":"SALVATION_003","t":"Once Saved, Always Saved?","obj":"A true believer cannot lose salvation.","tv":"John 10:28; Romans 8:38\u201339","tvt":"Jn 10:28 \u2013 No one snatches them from Christ. Rom 8:38\u201339 \u2013 Nothing separates us from Christ\u2019s love.","t1s":"Security in Christ does not eliminate free will or the possibility of falling.","t1v":"1 Corinthians 9:27; Hebrews 6:4\u20136","t1vt":"1 Cor 9:27 \u2013 Paul fears disqualification. Heb 6:4\u20136 \u2013 Believers can fall away.","t2s":"Jesus\u2019 promise protects against external forces, not freely chosen rejection. The NT repeatedly warns believers about falling away, showing salvation must be persevered in, not presumed.","t2e":"Believers must persevere in grace.","t3d":"If losing salvation is impossible, why warn about apostasy?","cat":"Salvation","tags":["Baptist","Reformed","Evangelical"],"ccc":"162; 1849; 2016","diff":3,"pts":30,"tier":"Core","age":"Adult Beginner","skill":"Scripture basic"},{"id":"SALVATION_004","t":"Does Baptism Save?","obj":"Baptism is only a symbol; it does not save.","tv":"1 Corinthians 1:17","tvt":"1 Cor 1:17 \u2013 Christ sent me to preach, not baptize.","t1s":"Scripture explicitly states that baptism saves.","t1v":"1 Peter 3:21; John 3:5","t1vt":"1 Pet 3:21 \u2013 'Baptism now saves you.' Jn 3:5 \u2013 Born of water and Spirit.","t2s":"Paul contrasts baptizing personally with preaching\u2014not baptism\u2019s importance. The NT presents baptism as regenerative, united to the Spirit, and necessary for entrance into the Kingdom.","t2e":"Baptism is a means of grace, not a symbol.","t3d":"If baptism is symbolic, why does Scripture call it rebirth and salvation?","cat":"Salvation","tags":["Baptist","Evangelical","Non-denominational"],"ccc":"1213\u20131284","diff":3,"pts":30,"tier":"Core","age":"Adult Beginner","skill":"Scripture basic; Sacraments"},{"id":"SALVATION_005","t":"Assurance of Salvation?","obj":"We can know with certainty that we are saved.","tv":"1 John 5:13","tvt":"1 Jn 5:13 \u2013 That you may know you have eternal life.","t1s":"Confidence is encouraged; absolute assurance is not biblical.","t1v":"Philippians 2:12; 1 Corinthians 10:12","t1vt":"Phil 2:12 \u2013 Work out salvation. 1 Cor 10:12 \u2013 Beware lest you fall.","t2s":"Biblical \u2018knowing\u2019 means confidence in God\u2019s promises, not infallible certainty of one\u2019s future perseverance. Scripture repeatedly warns believers to remain vigilant.","t2e":"Hope is sure; presumption is not.","t3d":"If the apostles warn believers not to fall, how is absolute assurance possible?","cat":"Salvation","tags":["Protestant","Reformed","Baptist"],"ccc":"1821; 2090\u20132092","diff":3,"pts":30,"tier":"Core","age":"Adult Beginner","skill":"Scripture basic"},{"id":"SALVATION_079","t":"Catholics teach works-based salvation.","obj":"Catholics teach works-based salvation.","tv":"","tvt":"","t1s":"","t1v":"","t1vt":"","t2s":"Catholics do not believe works earn salvation; salvation begins and ends with God\u2019s grace.","t2e":"Catholics believe we are saved by grace and empowered by the Holy Spirit to live out that grace. Works are the fruit of salvation, not its cause. Scripture links faith and obedience, and the early Church rejected any idea of self-earned salvation.","t3d":"","cat":"Salvation","tags":["Protestant","Evangelical"],"ccc":"1987\u20132001","diff":3,"pts":30,"tier":"Core","age":"Teen+","skill":"Soteriology"},{"id":"SCRIPTURE_201","t":"Bible Alone (Sola Scriptura)","obj":"We should follow the Bible alone. Scripture is the only authority for Christians.","tv":"2 Timothy 3:16\u201317","tvt":"2 Tim 3:16\u201317 \u2013 Scripture is inspired and useful, equipping the man of God.","t1s":"Scripture is supreme, but not isolated from the Church and Tradition that preserved it.","t1v":"1 Timothy 3:15; 2 Thessalonians 2:15","t1vt":"1 Tim 3:15 \u2013 Church is pillar of truth. 2 Thess 2:15 \u2013 Hold fast to traditions, written and oral.","t2s":"2 Timothy 3 never says Scripture is the *only* authority, only that it is inspired and profitable. The same Bible points to the Church as the pillar of truth and commands us to keep both written and oral traditions.","t2e":"The Bible upholds Scripture, Tradition, and the teaching Church together, not Scripture in isolation.","t3d":"Where does Scripture say it is the *only* authority a Christian may follow?","cat":"Scripture & Authority","tags":["Protestant","Evangelical","Reformed","Baptist"],"ccc":"80\u201382; 95; 113","diff":3,"pts":30,"tier":"Core","age":"Adult Beginner","skill":"Scripture basic; Tradition & history"},{"id":"SCRIPTURE_202","t":"Traditions of Men","obj":"Jesus condemned traditions of men. Why do Catholics follow tradition?","tv":"Mark 7:8\u201313","tvt":"Mk 7:8\u201313 \u2013 Jesus condemns human traditions that nullify God\u2019s word.","t1s":"Jesus condemns corrupt human traditions, not God-given apostolic Tradition.","t1v":"2 Thessalonians 2:15; 1 Corinthians 11:2","t1vt":"2 Thess 2:15 \u2013 Hold to traditions. 1 Cor 11:2 \u2013 Commends keeping traditions.","t2s":"Jesus rejects traditions that contradict God\u2019s word, not all tradition. The New Testament positively commands Christians to hold fast to apostolic traditions, both written and oral, passed on by the apostles.","t2e":"There is a difference between man-made traditions and apostolic Tradition from Christ.","t3d":"If all tradition is bad, why does Paul command believers to hold fast to traditions?","cat":"Scripture & Authority","tags":["Protestant","Evangelical","Reformed","Baptist"],"ccc":"74\u201383","diff":3,"pts":30,"tier":"Core","age":"Adult Beginner","skill":"Scripture basic; Tradition & history"},{"id":"SCRIPTURE_203","t":"Scripture Is Sufficient","obj":"Scripture makes the man of God \u2018complete\u2019; we don\u2019t need Tradition or a teaching Church.","tv":"2 Timothy 3:16\u201317","tvt":"2 Tim 3:16\u201317 \u2013 Scripture equips for every good work.","t1s":"Sufficiency of Scripture does not mean exclusivity of authority.","t1v":"Ephesians 4:11\u201314; Acts 8:30\u201331","t1vt":"Eph 4:11\u201314 \u2013 Teachers given to the Church. Acts 8:30\u201331 \u2013 Ethiopian needs guidance.","t2s":"Scripture equips but also points to teachers, sacraments, and community. Being \u2018complete\u2019 in Scripture doesn\u2019t exclude other God-given helps like pastors, sacraments, and apostolic Tradition.","t2e":"The Bible itself affirms the need for teaching authority and community.","t3d":"If the Bible alone were enough, why does God give pastors and teachers to guard doctrine?","cat":"Scripture & Authority","tags":["Protestant","Evangelical","Reformed"],"ccc":"84\u201387; 131\u2013133","diff":3,"pts":30,"tier":"Core","age":"Adult Beginner","skill":"Scripture basic; Ecclesiology"},{"id":"SCRIPTURE_001","t":"Sola Scriptura is biblical.","obj":"Sola Scriptura is biblical.","tv":"","tvt":"","t1s":"","t1v":"","t1vt":"","t2s":"Scripture never teaches Scripture alone.","t2e":"No biblical passage claims the Bible is the sole rule of faith. Scripture points to apostolic preaching and authority alongside written texts. Early Christians relied on the living Church, not a self-contained book, because the New Testament itself came through Tradition.","t3d":"","cat":"Scripture & Authority","tags":["Protestant","Baptist","Evangelical"],"ccc":"80\u201382","diff":4,"pts":40,"tier":"Advanced","age":"Teen+","skill":"Scripture & Authority"},{"id":"SACRAMENTS_029","t":"Is Baptism Valid Without Trinitarian Formula?","obj":"Any baptism in Jesus' name is valid.","tv":"Acts 2:38","tvt":"Acts 2:38 \u2013 Baptized in Jesus' name.","t1s":"'In Jesus' name' means by His authority.","t1v":"Matthew 28:19; Acts 19:5","t1vt":"Mt 28 \u2013 Baptize in Trinity. Acts 19 \u2013 Rebaptized properly.","t2s":"Church follows explicit Trinitarian command.","t2e":"Jesus explicitly commands baptism in the name of the Father, and of the Son, and of the Holy Spirit. 'In Jesus' name' in Acts means by His authority, not as a replacement formula. To change Christ's words is to alter the sacrament's form and endanger validity.","t3d":"If 'Jesus-only' worked, why correct invalid baptisms in Acts?","cat":"Baptism","tags":["Oneness Pentecostal","JW"],"ccc":"1239\u20131245","diff":4,"pts":40,"tier":"Intermediate","age":"Adult Intermediate","skill":"Baptism; Scripture"},{"id":"SACRAMENTS_030","t":"Do Unbaptized Babies Go to Limbo?","obj":"Unbaptized infants cannot be saved.","tv":"Romans 5:12","tvt":"Rom 5:12 \u2013 Sin entered through one man.","t1s":"God desires all to be saved and provides mysterious means.","t1v":"1 Tim 2:4; Mark 10:14","t1vt":"1 Tim \u2013 God wills all saved. Mk 10 \u2013 Children come to Him.","t2s":"The Church entrusts infants to God\u2019s mercy.","t2e":"The Church entrusts unbaptized infants to God's mercy, who is not bound by the sacraments He gave us. We reject both despair and presumption. Christ's universal salvific will and His love for children ground a firm hope that He provides for them in ways He has not fully revealed.","t3d":"If Christ welcomes children, why assume exclusion?","cat":"Baptism","tags":["Protestant","Secular"],"ccc":"1260","diff":3,"pts":30,"tier":"Core","age":"Adult Beginner","skill":"Baptism; Salvation"},{"id":"SACRAMENTS_013","t":"Why Can\u2019t Non-Catholics Receive Communion?","obj":"Communion is for all Christians, not just Catholics.","tv":"1 Cor 11:28","tvt":"1 Cor 11:28 \u2013 Examine yourself before eating.","t1s":"Communion expresses full unity in faith and doctrine.","t1v":"1 Cor 10:17; Acts 2:42","t1vt":"1 Cor 10 \u2013 One bread, one body. Acts 2 \u2013 Continuity in apostolic teaching.","t2s":"Sharing the Eucharist means sharing faith in what it is and what the Church teaches.","t2e":"The Eucharist is the sign of full unity in faith and worship. If we don't yet share belief in the Church, sacraments, and Real Presence, receiving together would be dishonest. The Church asks non-Catholics to wait until real unity exists before sharing Communion.","t3d":"If communion is universal, why does Paul warn about unworthy reception?","cat":"Eucharist","tags":["Protestant","Ecumenical"],"ccc":"1395\u20131401","diff":4,"pts":40,"tier":"Intermediate","age":"Adult Intermediate","skill":"Eucharistic theology"},{"id":"SACRAMENTS_014","t":"Is Communion Just a Memorial Meal?","obj":"Jesus meant only to remember\u2014not to change bread and wine.","tv":"Luke 22:19","tvt":"Lk 22:19 \u2013 Do this in remembrance.","t1s":"Jewish remembrance makes past events present.","t1v":"John 6:55; 1 Cor 11:27","t1vt":"Jn 6 \u2013 True food. 1 Cor 11 \u2013 Guilty of Body and Blood.","t2s":"Biblical \u201cremembrance\u201d is a living participation, not a bare mental memory.","t2e":"Jesus says, \u201cDo this in remembrance of me,\u201d using covenant language where remembering makes God\u2019s saving work present again. Paul warns that unworthy reception profanes Christ\u2019s Body. That would be impossible if Communion were only a mental reminder and not a real encounter with Him.","t3d":"If Eucharist is only memory, why guilt for disrespecting Christ\u2019s Body?","cat":"Eucharist","tags":["Protestant","Baptist"],"ccc":"1330\u20131347","diff":4,"pts":40,"tier":"Intermediate","age":"Adult Intermediate","skill":"Eucharistic theology"},{"id":"SACRAMENTS_007","t":"Can\u2019t I Confess Directly to God?","obj":"Confession to God alone is enough.","tv":"Psalm 32:5","tvt":"Ps 32:5 \u2013 I acknowledged my sin.","t1s":"Scripture commands confession within the Church.","t1v":"James 5:16; John 20:23","t1vt":"Jas 5 \u2013 Confess to one another. Jn 20 \u2013 Apostles forgive sins.","t2s":"Private confession is good, but Christ established sacramental confession.","t2e":"God forgives, but He uses visible means.","t3d":"If confession is private only, why delegate forgiveness to apostles?","cat":"Confession","tags":["Protestant","Lapsed Catholic"],"ccc":"1455\u20131460","diff":2,"pts":20,"tier":"Core","age":"Adult Beginner","skill":"Confession; Scripture"},{"id":"SACRAMENTS_021","t":"Is Confession to a Priest Psychological Only?","obj":"Confession is therapy, not sacrament.","tv":"Psalm 51:3","tvt":"Ps 51 \u2013 My sin is always before me.","t1s":"Christ gave sacramental forgiveness through His ministers.","t1v":"John 20:21\u201323; James 5:15\u201316","t1vt":"Jn 20 \u2013 Authority to forgive. Jas 5 \u2013 Confess to one another.","t2s":"Confession heals spiritually and psychologically.","t2e":"Grace complements human healing.","t3d":"If confession is therapy, why attach divine forgiveness to the act?","cat":"Confession","tags":["Secular","Protestant"],"ccc":"1456\u20131460","diff":2,"pts":20,"tier":"Core","age":"Adult Beginner","skill":"Confession; Scripture"},{"id":"SACRAMENTS_039","t":"Does Confession Violate Privacy?","obj":"Telling sins to a priest invades personal privacy.","tv":"Psalm 32:5","tvt":"Ps 32 \u2013 Confessed and forgiven.","t1s":"Confession is confidential through the seal.","t1v":"John 20:21\u201323; James 5:16","t1vt":"Jn 20 \u2013 Authority to forgive. Jas \u2013 Confess to one another.","t2s":"Seal of confession protects absolute privacy.","t2e":"Priest cannot reveal anything under any circumstance.","t3d":"If privacy violated, why risk severe ecclesial penalties?","cat":"Confession","tags":["Secular","Protestant"],"ccc":"1467","diff":2,"pts":20,"tier":"Core","age":"Adult Beginner","skill":"Confession; Morality"},{"id":"SACRAMENTS_009","t":"Why Can\u2019t Catholics Divorce?","obj":"Jesus allows divorce\u2014Catholics are too strict.","tv":"Matthew 19:9","tvt":"Mt 19:9 \u2013 Except for porneia.","t1s":"Jesus teaches lifelong indissolubility.","t1v":"Matthew 19:6; Mark 10:11","t1vt":"Mt 19 \u2013 Not separated. Mk 10 \u2013 Remarriage is adultery.","t2s":"Porneia refers to unlawful unions, not divorce.","t2e":"Marriage is a permanent covenant.","t3d":"If divorce were permitted, why prohibit remarriage?","cat":"Marriage","tags":["Protestant","Secular"],"ccc":"1614\u20131620","diff":4,"pts":40,"tier":"Intermediate","age":"Adult Intermediate","skill":"Marriage; Scripture"},{"id":"SACRAMENTS_020","t":"Do Annulments Mean \u2018Catholic Divorce\u2019?","obj":"Annulment is divorce in disguise.","tv":"Matthew 19:6","tvt":"Mt 19:6 \u2013 Not to be separated.","t1s":"Annulment recognizes a marriage never validly existed.","t1v":"1 Cor 7:15; Matthew 5:32","t1vt":"1 Cor \u2013 Not bound. Mt 5 \u2013 Unlawful unions.","t2s":"Tribunal determines if sacramental form was absent.","t2e":"Annulment diagnoses; divorce dissolves.","t3d":"If annulment equals divorce, why examine validity rather than permit dissolution?","cat":"Marriage","tags":["Secular","Protestant"],"ccc":"1625\u20131632","diff":3,"pts":30,"tier":"Core","age":"Adult Beginner","skill":"Marriage; Sacraments"},{"id":"SACRAMENTS_022","t":"Can Extreme Unction Save the Soul at Death Only?","obj":"Anointing is for deathbed salvation only.","tv":"James 5:15","tvt":"Jas 5:15 \u2013 Prayer saves the sick.","t1s":"Anointing forgives, strengthens, and heals soul and body.","t1v":"Mark 6:13; James 5:14","t1vt":"Mk 6 \u2013 Apostles heal with oil. Jas 5 \u2013 Call presbyters.","t2s":"Sacrament confers strengthening grace anytime serious illness occurs.","t2e":"Not limited to imminent death.","t3d":"If anointing is only for dying, why apply to healing ministry?","cat":"Anointing","tags":["Protestant","Secular"],"ccc":"1520\u20131523","diff":3,"pts":30,"tier":"Core","age":"Adult Beginner","skill":"Anointing; Healing"},{"id":"SACRAMENTS_044","t":"Is Anointing Only Symbolic?","obj":"Oil does nothing spiritual.","tv":"Mark 6:13","tvt":"Mk 6:13 \u2013 Anointed sick and healed.","t1s":"Sacrament conveys grace for healing and forgiveness.","t1v":"James 5:14\u201315; Luke 10:34","t1vt":"Jas \u2013 Prayer saves. Lk \u2013 Oil in healing.","t2s":"Symbol points to real action of grace.","t2e":"Christ uses material signs to heal.","t3d":"If symbolic only, why forgive sins through it?","cat":"Anointing","tags":["Secular","Protestant"],"ccc":"1520\u20131523","diff":2,"pts":20,"tier":"Core","age":"Adult Beginner","skill":"Healing; Sacraments"},{"id":"SACRAMENTS_045","t":"Does Anointing Guarantee Physical Healing?","obj":"If someone dies, sacrament failed.","tv":"2 Cor 12:9","tvt":"My grace sufficient.","t1s":"Sacrament strengthens spiritually and prepares for union.","t1v":"James 5:14\u201315; Romans 8:28","t1vt":"Jas \u2013 Raises sick. Rom \u2013 All for good.","t2s":"Healing may be spiritual, physical, or both.","t2e":"Grace not defeated by death.","t3d":"If physical healing required, why die eventually?","cat":"Anointing","tags":["Protestant","Secular"],"ccc":"1520","diff":2,"pts":20,"tier":"Core","age":"Adult Beginner","skill":"Healing; Spiritual life"},{"id":"SACRAMENTS_046","t":"Why Does the Church Use Oil?","obj":"Why not pray without material rituals?","tv":"James 5:14","tvt":"Jas 5 \u2013 Anoint with oil.","t1s":"God uses material signs to convey grace.","t1v":"Mark 6:13; Genesis 28:18","t1vt":"Mk \u2013 Apostles anoint. Gen \u2013 Oil symbolizes consecration.","t2s":"Matter expresses spiritual reality.","t2e":"Incarnation shows God works through matter.","t3d":"If signs unnecessary, why did Jesus employ them?","cat":"Anointing","tags":["Protestant","Secular"],"ccc":"1512\u20131513","diff":2,"pts":20,"tier":"Core","age":"Adult Beginner","skill":"Sacramental signs"},{"id":"SACRAMENTS_012","t":"Is Apostolic Succession Biblical?","obj":"Priesthood vanished after apostles died.","tv":"Acts 14:23","tvt":"Acts 14:23 \u2013 They appointed elders.","t1s":"Apostles appointed successors to continue ministry.","t1v":"2 Tim 1:6; Titus 1:5","t1vt":"2 Tim \u2013 Gift through laying on hands. Titus \u2013 Appoint elders in every town.","t2s":"Church authority continues through succession.","t2e":"Ordination transmits apostolic mission.","t3d":"If succession ended, who preserved doctrine and teaching authority?","cat":"Holy Orders","tags":["Protestant","Non-denominational"],"ccc":"861\u2013863","diff":4,"pts":40,"tier":"Intermediate","age":"Adult Intermediate","skill":"Ecclesiology; Scripture"},{"id":"SACRAMENTS_015","t":"Why Can\u2019t Priests Marry?","obj":"Clerical celibacy is unnatural and unbiblical.","tv":"1 Tim 3:2","tvt":"1 Tim 3:2 \u2013 Bishop must be husband of one wife.","t1s":"Celibacy is a discipline modeled after Christ.","t1v":"Matthew 19:12; 1 Cor 7:32\u201335","t1vt":"Mt 19 \u2013 Made themselves eunuchs for the kingdom. 1 Cor \u2013 Undivided devotion.","t2s":"Celibacy enables total availability for ministry.","t2e":"The Church imitates Christ\u2019s celibate life.","t3d":"If celibacy is wrong, why does Jesus praise it for the kingdom?","cat":"Holy Orders","tags":["Protestant","Secular"],"ccc":"1579\u20131580","diff":3,"pts":30,"tier":"Core","age":"Adult Beginner","skill":"Holy Orders; Pastoral"},{"id":"SACRAMENTS_016","t":"Do Priests Have Spiritual Power Ordinary Christians Lack?","obj":"All believers are priests\u2014no hierarchy needed.","tv":"1 Peter 2:9","tvt":"1 Pt 2:9 \u2013 Royal priesthood.","t1s":"Ministerial priesthood differs from baptismal priesthood.","t1v":"John 20:21\u201323; Titus 1:5","t1vt":"Jn 20 \u2013 Authority to forgive. Titus \u2013 Appoint elders.","t2s":"Christ establishes hierarchical service, not inequality.","t2e":"Priestly ministry continues apostolic authority.","t3d":"If all roles same, why appoint elders and give them authority?","cat":"Holy Orders","tags":["Protestant","Non\u2011denominational"],"ccc":"1546\u20131553","diff":4,"pts":40,"tier":"Intermediate","age":"Adult Intermediate","skill":"Ecclesiology; Scripture"},{"id":"SACRAMENTS_017","t":"Why Can\u2019t Women Be Ordained?","obj":"Gender roles in priesthood are discriminatory.","tv":"1 Cor 14:34","tvt":"1 Cor 14:34 \u2013 Women silent in churches.","t1s":"Christ chose men for apostolic ministry.","t1v":"Luke 6:12\u201316; 1 Tim 3:2","t1vt":"Lk 6 \u2013 Male apostles. 1 Tim \u2013 Bishop is husband of one wife.","t2s":"Priest represents Christ the Bridegroom sacramentally.","t2e":"Distinct roles reflect divine revelation, not inequality.","t3d":"If equality is sameness, why no female apostles or presiders?","cat":"Holy Orders","tags":["Secular","Protestant"],"ccc":"1577","diff":4,"pts":40,"tier":"Intermediate","age":"Adult Intermediate","skill":"Holy Orders; Theology"},{"id":"SACRAMENTS_037","t":"Does Confirmation Add Anything to Baptism?","obj":"Baptism already gives the Spirit\u2014confirmation is redundant.","tv":"Acts 2:38","tvt":"Acts 2:38 \u2013 Receive the Holy Spirit.","t1s":"Confirmation deepens and strengthens baptismal grace.","t1v":"Acts 8:14\u201317; Heb 6:2","t1vt":"Acts 8 \u2013 Spirit given through laying on hands. Heb 6 \u2013 Foundational doctrine.","t2s":"Confirmation perfects initiation, equipping for mission.","t2e":"Confirmation strengthens baptism.","t3d":"If confirmation adds nothing, why did apostles administer it separately?","cat":"Confirmation","tags":["Protestant","Evangelical"],"ccc":"1285\u20131314","diff":3,"pts":30,"tier":"Core","age":"Adult Beginner","skill":"Initiation; Pneumatology"},{"id":"SACRAMENTS_038","t":"Is Confirmation Merely a Coming-of-Age Ritual?","obj":"It\u2019s cultural, not sacramental.","tv":"1 Cor 12:7","tvt":"1 Cor 12:7 \u2013 Gifts of Spirit manifest.","t1s":"Sacrament imparts actual strengthening grace.","t1v":"Acts 19:5\u20136; Eph 4:30","t1vt":"Acts \u2013 Spirit through hands. Eph \u2013 Sealed for redemption.","t2s":"Cultural maturity differs from spiritual empowerment.","t2e":"Grace is real, not symbolic.","t3d":"If symbolic, why associate it with apostolic laying on of hands?","cat":"Confirmation","tags":["Secular","Lapsed Catholic"],"ccc":"1302\u20131305","diff":2,"pts":20,"tier":"Core","age":"Adult Beginner","skill":"Sacraments; Spiritual growth"},{"id":"SACRAMENTS_024","t":"Is the Eucharist Idolatry?","obj":"Worshipping the Eucharist worships bread.","tv":"Exodus 20:4","tvt":"Ex 20:4 \u2013 No graven images.","t1s":"If Christ is truly present, worship is owed to Him.","t1v":"John 20:28; John 6:51","t1vt":"Jn 20 \u2013 \u201cMy Lord and my God.\u201d Jn 6 \u2013 Bread is His flesh.","t2s":"If Jesus is truly present, adoring the Eucharist is worship of God, not bread.","t2e":"Idolatry is worshiping something that is not God. If the Eucharist were only bread, adoration would be wrong. But if Jesus is truly present under the appearance of bread, then adoring the Eucharist is simply adoring Christ Himself, the Lord we love and follow.","t3d":"If Eucharist is symbolic, why did Jesus identify Himself with the bread?","cat":"Eucharist","tags":["Protestant","Evangelical"],"ccc":"1378\u20131381","diff":4,"pts":40,"tier":"Intermediate","age":"Adult Intermediate","skill":"Eucharistic theology"},{"id":"SACRAMENTS_049","t":"Why doesn\u2019t the Eucharist look like real flesh?","obj":"Why doesn\u2019t the Eucharist look like real flesh?","tv":"","tvt":"","t1s":"","t1v":"","t1vt":"","t2s":"God often hides His power under humble signs so faith can respond freely.","t2e":"The Eucharist looks like bread because Jesus chose sacramental signs that communicate grace without overwhelming us. God often works through simple forms\u2014like water, oil, and human speech. The substance truly becomes Christ\u2019s Body and Blood even when the appearance remains ordinary.","t3d":"","cat":"Eucharist","tags":["Protestant","Evangelical"],"ccc":"1373\u20131377","diff":2,"pts":20,"tier":"Core","age":"Teen+","skill":"Eucharistic theology"},{"id":"SACRAMENTS_018","t":"Is Marriage Inferior to Celibacy?","obj":"Church devalues marriage by praising celibacy.","tv":"1 Cor 7:38","tvt":"1 Cor 7:38 \u2013 He who marries does well; he who refrains does better.","t1s":"Both vocations are gifts from God.","t1v":"Eph 5:31\u201332; 1 Cor 7:7","t1vt":"Eph 5 \u2013 Mystery of Christ. 1 Cor \u2013 Each has own gift.","t2s":"Celibacy points to kingdom; marriage images Christ and Church.","t2e":"Supremacy language means eschatological sign, not moral superiority.","t3d":"If marriage is inferior, why call it a sacrament imaging Christ?","cat":"Marriage","tags":["Protestant","Secular"],"ccc":"1603\u20131617","diff":3,"pts":30,"tier":"Core","age":"Adult Beginner","skill":"Marriage; Theology"},{"id":"SACRAMENTS_019","t":"Is Divorce Allowed if There Is Abuse?","obj":"Scripture allows divorce in some cases.","tv":"Matthew 19:9","tvt":"Mt 19:9 \u2013 Except for porneia.","t1s":"The Church permits separation, not sacramental dissolution.","t1v":"1 Cor 7:10\u201311; Matthew 19:6","t1vt":"1 Cor 7 \u2013 Separate but remain unmarried. Mt 19 \u2013 What God joins.","t2s":"Porneia refers to invalid unions, not dissolution of valid marriage.","t2e":"Safety allows separation; sacrament remains intact.","t3d":"If abuse dissolves marriage, why command remaining unmarried?","cat":"Marriage","tags":["Secular","Protestant"],"ccc":"1649\u20131651","diff":4,"pts":40,"tier":"Intermediate","age":"Adult Intermediate","skill":"Marriage; Scripture"},{"id":"SACRAMENTS_040","t":"Is the Seal of Confession Biblical?","obj":"Bible never teaches secrecy for confession.","tv":"James 5:16","tvt":"Jas 5:16 \u2013 Confess to one another.","t1s":"Priests act as Christ\u2019s ministers, requiring discretion.","t1v":"Proverbs 11:13; John 20:23","t1vt":"Prov \u2013 Trustworthy man keeps secret. Jn \u2013 Apostles forgive.","t2s":"Seal protects dignity and openness.","t2e":"Biblical virtue supports confidentiality.","t3d":"If no confidentiality, why confess at all?","cat":"Confession","tags":["Protestant","Secular"],"ccc":"1467\u20131469","diff":3,"pts":30,"tier":"Core","age":"Adult Beginner","skill":"Morality; Confession"},{"id":"SACRAMENTS_031","t":"Is Baptism of Desire Real?","obj":"Unbaptized believers cannot be saved.","tv":"John 3:5","tvt":"Jn 3:5 \u2013 Born of water and Spirit.","t1s":"God can grant grace outside the sacrament when impossible.","t1v":"Acts 10:44\u201348; Wisdom 3:1","t1vt":"Acts \u2013 Spirit given before baptism. Wis \u2013 Souls in God's hand.","t2s":"Desire includes implicit longing for truth.","t2e":"Baptism of desire means that those who, through no fault of their own, die with an implicit or explicit desire for baptism can receive its grace without the ritual. God is free to apply Christ's merits when the sacrament is impossible, without making baptism optional for those who know its necessity.","t3d":"If desire is invalid, how did the Spirit precede water baptism?","cat":"Baptism","tags":["Protestant","Baptist"],"ccc":"1257\u20131261","diff":4,"pts":40,"tier":"Intermediate","age":"Adult Intermediate","skill":"Soteriology; Baptism"},{"id":"SCRIPTURE_204","t":"Private Interpretation Only","obj":"Every believer can interpret the Bible for himself with the Holy Spirit. No Church authority is needed.","tv":"1 John 2:27","tvt":"1 Jn 2:27 \u2013 Anointing teaches you about everything.","t1s":"The Spirit guides the Church as a body, not isolated individuals into private doctrines.","t1v":"2 Peter 1:20\u201321; 2 Peter 3:16","t1vt":"2 Pet 1:20\u201321 \u2013 No prophecy is private interpretation. 2 Pet 3:16 \u2013 Scriptures twisted to destruction.","t2s":"The Holy Spirit teaches through the Church, not independent of it. Scripture warns against private interpretation and distortion. The same Spirit who inspired the Bible also guards its meaning in the Church.","t2e":"Personal reading is vital but must remain within the Church\u2019s faith.","t3d":"If private interpretation is enough, why does Scripture warn against twisting it and emphasize the Church\u2019s teaching role?","cat":"Scripture & Authority","tags":["Protestant","Evangelical","Non-denominational"],"ccc":"85\u201387; 113\u2013119","diff":4,"pts":40,"tier":"Intermediate","age":"Adult Intermediate","skill":"Scripture advanced; Ecclesiology; Hermeneutics"},{"id":"SCRIPTURE_205","t":"Do Not Add to God\u2019s Word","obj":"The Bible says not to add to God\u2019s word. Catholic Tradition adds extra doctrines.","tv":"Deuteronomy 4:2; Revelation 22:18\u201319","tvt":"Deut 4:2; Rev 22:18\u201319 \u2013 Warnings against adding to God\u2019s revelation.","t1s":"The Church guards and unfolds revelation; she does not add new public revelation.","t1v":"John 16:13; Jude 3","t1vt":"Jn 16:13 \u2013 Spirit guides into all truth. Jude 3 \u2013 Faith once for all delivered.","t2s":"These texts forbid corrupting God\u2019s revelation, not explaining it. The Church does not add new public revelation; she safeguards and deepens understanding of what Christ already gave.","t2e":"Doctrine develops in depth, not in kind; no new Gospel is added.","t3d":"Is defining a doctrine more clearly the same as inventing a new revelation?","cat":"Scripture & Authority","tags":["Protestant","Evangelical","Reformed","Baptist"],"ccc":"66\u201367; 94","diff":4,"pts":40,"tier":"Intermediate","age":"Adult Intermediate","skill":"Scripture advanced; Doctrine development"}];

function getLevel(xp){if(xp<100)return{level:1,name:"Seeker",next:100};if(xp<300)return{level:2,name:"Learner",next:300};if(xp<600)return{level:3,name:"Defender",next:600};if(xp<1000)return{level:4,name:"Apologist",next:1000};if(xp<1600)return{level:5,name:"Guardian",next:1600};if(xp<2500)return{level:6,name:"Scholar",next:2500};if(xp<4000)return{level:7,name:"Doctor",next:4000};return{level:8,name:"Doctor of the Church",next:99999}}
const XP_THRESHOLDS=[0,0,100,300,600,1000,1600,2500,4000];

function loadState(){try{const s=localStorage.getItem("veritas_state");if(s)return JSON.parse(s)}catch(e){}return{xp:0,streak:0,lastDate:null,completed:[],favorites:[],dailyDone:false}}
function saveState(s){try{localStorage.setItem("veritas_state",JSON.stringify(s))}catch(e){}}

function HaloIcon({size=20,color="#D4A843"}){return <svg width={size} height={size} viewBox="0 0 24 24" fill="none"><circle cx="12" cy="14" r="7" stroke={color} strokeWidth="2" fill="none"/><ellipse cx="12" cy="7" rx="8" ry="3" stroke={color} strokeWidth="2" fill="none"/></svg>}

function TopBar({xp,streak}){
  const lvl=getLevel(xp);
  const pct=Math.min(((xp-XP_THRESHOLDS[lvl.level])/(lvl.next-XP_THRESHOLDS[lvl.level]))*100,100);
  return <div style={{position:"sticky",top:0,zIndex:90,background:"linear-gradient(180deg,#1A1612 0%,rgba(26,22,18,0.95) 100%)",borderBottom:"1px solid rgba(212,168,67,0.15)",padding:"10px 16px 8px",backdropFilter:"blur(20px)"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <div style={{display:"flex",alignItems:"center",gap:6}}>
        <span style={{fontSize:14,color:"#D4A843",fontFamily:"'Cormorant Garamond',Georgia,serif",fontWeight:700}}>Lv.{lvl.level}</span>
        <span style={{fontSize:12,color:"#C4B896",fontFamily:"'Cormorant Garamond',Georgia,serif",fontStyle:"italic"}}>{lvl.name}</span>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:12}}>
        <div style={{display:"flex",alignItems:"center",gap:4}}><HaloIcon size={16}/><span style={{fontSize:13,color:"#D4A843",fontWeight:600,fontFamily:"Georgia,serif"}}>{xp}</span></div>
        {streak>0&&<div style={{display:"flex",alignItems:"center",gap:3}}><span style={{fontSize:14}}>🔥</span><span style={{fontSize:13,color:"#E8873A",fontWeight:600,fontFamily:"Georgia,serif"}}>{streak}</span></div>}
      </div>
    </div>
    <div style={{height:3,background:"rgba(212,168,67,0.15)",borderRadius:2,marginTop:6,overflow:"hidden"}}><div style={{height:"100%",width:`${pct}%`,background:"linear-gradient(90deg,#D4A843,#E8C860)",borderRadius:2,transition:"width 0.5s ease"}}/></div>
  </div>
}

function NavBar({screen,setScreen}){
  const items=[{id:"home",icon:"\u2302",label:"Home"},{id:"categories",icon:"\u2630",label:"Browse"},{id:"search",icon:"\u2315",label:"Search"},{id:"profile",icon:"\u2606",label:"Profile"}];
  return <div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:100,background:"linear-gradient(180deg,rgba(26,22,18,0.97) 0%,#1A1612 100%)",borderTop:"1px solid rgba(212,168,67,0.2)",display:"flex",justifyContent:"space-around",alignItems:"center",padding:"6px 0 max(6px, env(safe-area-inset-bottom))",backdropFilter:"blur(20px)"}}>
    {items.map(it=><button key={it.id} onClick={()=>setScreen(it.id)} style={{background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"4px 16px",color:screen===it.id?"#D4A843":"#8A7E6E",transition:"color 0.2s"}}><span style={{fontSize:22}}>{it.icon}</span><span style={{fontSize:10,fontFamily:"'Cormorant Garamond',Georgia,serif",letterSpacing:1}}>{it.label}</span></button>)}
  </div>
}

function CardViewer({card,onBack,onComplete,isCompleted,isFav,onToggleFav}){
  const[tier,setTier]=useState(0);
  const[flipped,setFlipped]=useState(false);
  const[showAnim,setShowAnim]=useState(false);
  const catColor=CAT_COLORS[card.cat]||"#D4A843";
  const handleComplete=()=>{setShowAnim(true);setTimeout(()=>{setShowAnim(false);onComplete(card)},1200)};

  return <div style={{minHeight:"100vh",background:"#12100D",paddingBottom:80}}>
    <div style={{padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <button onClick={onBack} style={{background:"none",border:"none",color:"#D4A843",fontSize:14,fontFamily:"'Cormorant Garamond',Georgia,serif",cursor:"pointer",padding:"8px 0"}}>{"\u2190 Back"}</button>
      <button onClick={()=>onToggleFav(card.id)} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:isFav?"#D4A843":"#4A433A"}}>{isFav?"\u2605":"\u2606"}</button>
    </div>
    <div style={{margin:"0 16px",position:"relative",minHeight:420,animation:"cardAppear 0.4s ease"}}>
      <div onClick={()=>setFlipped(!flipped)} style={{background:"linear-gradient(145deg,#2A241E 0%,#1E1A15 100%)",border:"1px solid rgba(212,168,67,0.2)",borderRadius:16,minHeight:420,cursor:"pointer",boxShadow:"0 8px 32px rgba(0,0,0,0.4),inset 0 1px 0 rgba(212,168,67,0.08)",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",top:0,left:0,right:0,height:3,background:`linear-gradient(90deg,transparent,${catColor},transparent)`}}/>
        {!flipped?
          <div style={{padding:"28px 24px",display:"flex",flexDirection:"column",height:"100%",boxSizing:"border-box",minHeight:420}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
              <span style={{background:catColor,color:"#fff",fontSize:10,padding:"3px 10px",borderRadius:12,fontFamily:"'Cormorant Garamond',Georgia,serif",fontWeight:600,letterSpacing:0.5}}>{card.cat}</span>
              <div style={{display:"flex",gap:6}}>{card.tags.slice(0,2).map(tag=><span key={tag} style={{fontSize:9,color:"#8A7E6E",border:"1px solid rgba(138,126,110,0.3)",padding:"2px 7px",borderRadius:10,fontFamily:"Georgia,serif"}}>{tag}</span>)}</div>
            </div>
            <div style={{fontSize:10,color:catColor,letterSpacing:2,fontFamily:"'Cormorant Garamond',Georgia,serif",fontWeight:600,marginBottom:6}}>THEY SAY:</div>
            <h2 style={{fontSize:22,color:"#F0E8D4",fontFamily:"'Cormorant Garamond',Georgia,serif",fontWeight:700,lineHeight:1.25,margin:"0 0 12px"}}>{card.t}</h2>
            <p style={{fontSize:15,color:"#C4B896",fontFamily:"Georgia,serif",lineHeight:1.6,fontStyle:"italic",flex:1}}>"{card.obj}"</p>
            {card.tv&&<div style={{background:"rgba(212,168,67,0.08)",borderLeft:`3px solid ${catColor}`,padding:"10px 14px",borderRadius:"0 8px 8px 0",marginTop:12}}>
              <div style={{fontSize:11,color:"#D4A843",fontWeight:600,fontFamily:"'Cormorant Garamond',Georgia,serif",marginBottom:4}}>{card.tv}</div>
              <div style={{fontSize:12,color:"#8A7E6E",fontFamily:"Georgia,serif",lineHeight:1.5}}>{card.tvt}</div>
            </div>}
            <div style={{textAlign:"center",marginTop:16,color:"#6B5E4E",fontSize:12,fontFamily:"Georgia,serif"}}>Tap to see the Catholic response →</div>
          </div>
        :
          <div style={{padding:"24px 20px",display:"flex",flexDirection:"column",minHeight:420,boxSizing:"border-box",overflow:"auto"}}>
            <div style={{fontSize:10,color:"#D4A843",letterSpacing:2,fontFamily:"'Cormorant Garamond',Georgia,serif",fontWeight:600,marginBottom:8}}>CATHOLIC RESPONSE</div>
            <div style={{display:"flex",gap:6,marginBottom:16}}>
              {[1,2,3].map(t=>{const has=t===1?card.t1s:t===2?card.t2s:card.t3d;return<button key={t} onClick={e=>{e.stopPropagation();setTier(t-1)}} disabled={!has} style={{flex:1,padding:"8px 4px",border:"none",borderRadius:8,cursor:has?"pointer":"default",background:tier===t-1?TIER_COLORS[t]:"rgba(212,168,67,0.08)",color:tier===t-1?"#F0E8D4":has?"#C4B896":"#4A433A",fontSize:10,fontWeight:600,fontFamily:"'Cormorant Garamond',Georgia,serif",letterSpacing:0.5,transition:"all 0.3s",opacity:has?1:0.4}}>{TIER_LABELS[t]}</button>})}
            </div>
            {tier===0&&card.t1s&&<div style={{animation:"fadeSlideUp 0.3s ease"}}>
              <p style={{fontSize:17,color:"#F0E8D4",fontFamily:"'Cormorant Garamond',Georgia,serif",fontWeight:600,lineHeight:1.5,margin:"0 0 16px"}}>{card.t1s}</p>
              {card.t1v&&<div style={{background:"rgba(212,168,67,0.1)",borderRadius:10,padding:"12px 16px"}}>
                <div style={{fontSize:12,color:"#D4A843",fontWeight:600,marginBottom:6,fontFamily:"'Cormorant Garamond',Georgia,serif"}}>{card.t1v}</div>
                <div style={{fontSize:13,color:"#C4B896",fontFamily:"Georgia,serif",lineHeight:1.6}}>{card.t1vt}</div>
              </div>}
            </div>}
            {tier===0&&!card.t1s&&<div style={{textAlign:"center",padding:20,color:"#6B5E4E",fontFamily:"Georgia,serif"}}><p>Tier 1 coming soon.</p><p style={{fontSize:13}}>Try "Go Deeper" for the full response.</p></div>}
            {tier===1&&<div style={{animation:"fadeSlideUp 0.3s ease"}}>
              <p style={{fontSize:15,color:"#F0E8D4",fontFamily:"Georgia,serif",lineHeight:1.65,margin:"0 0 14px"}}>{card.t2s}</p>
              <p style={{fontSize:14,color:"#C4B896",fontFamily:"Georgia,serif",lineHeight:1.6}}>{card.t2e}</p>
            </div>}
            {tier===2&&card.t3d&&<div style={{animation:"fadeSlideUp 0.3s ease"}}>
              <div style={{background:"rgba(212,168,67,0.06)",border:"1px solid rgba(212,168,67,0.2)",borderRadius:12,padding:20,textAlign:"center"}}>
                <div style={{fontSize:10,color:"#D4A843",letterSpacing:2,marginBottom:10,fontFamily:"'Cormorant Garamond',Georgia,serif"}}>ASK THEM THIS</div>
                <p style={{fontSize:17,color:"#F0E8D4",fontFamily:"'Cormorant Garamond',Georgia,serif",fontWeight:600,lineHeight:1.5,fontStyle:"italic",margin:0}}>"{card.t3d}"</p>
              </div>
            </div>}
            <div style={{marginTop:"auto",paddingTop:16,display:"flex",gap:8}}>
              {card.ccc&&<span style={{fontSize:10,color:"#6B5E4E",fontFamily:"Georgia,serif"}}>CCC {card.ccc}</span>}
              <span style={{fontSize:10,color:"#6B5E4E",marginLeft:"auto",fontFamily:"Georgia,serif"}}>{DIFF_LABELS[card.diff]} • {card.pts} halos</span>
            </div>
          </div>
        }
      </div>
      {showAnim&&<div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",zIndex:10,animation:"haloFloat 1.2s ease forwards"}}><div style={{fontSize:48,color:"#D4A843",textShadow:"0 0 40px rgba(212,168,67,0.6)"}}>+{card.pts} ✨</div></div>}
    </div>
    {flipped&&!isCompleted&&<div style={{padding:16,textAlign:"center"}}><button onClick={handleComplete} style={{background:"linear-gradient(135deg,#D4A843,#B8922E)",color:"#12100D",border:"none",borderRadius:12,padding:"14px 40px",fontSize:15,fontWeight:700,fontFamily:"'Cormorant Garamond',Georgia,serif",letterSpacing:1,cursor:"pointer",boxShadow:"0 4px 16px rgba(212,168,67,0.3)"}}>MASTERED • +{card.pts} HALOS</button></div>}
    {isCompleted&&<div style={{textAlign:"center",padding:16,color:"#5AAF6A",fontFamily:"Georgia,serif",fontSize:13}}>✓ Card completed</div>}
  </div>
}

function HomeScreen({state,setScreen,setActiveCard}){
  const lvl=getLevel(state.xp);
  const today=new Date().toDateString();
  const dailyCard=useMemo(()=>{const seed=new Date().getDate()+new Date().getMonth()*31;return CARDS_DATA[seed%CARDS_DATA.length]},[]);
  const cats=useMemo(()=>{const m={};CARDS_DATA.forEach(c=>{if(!m[c.cat])m[c.cat]={total:0,done:0};m[c.cat].total++;if(state.completed.includes(c.id))m[c.cat].done++});return m},[state.completed]);
  const totalPct=Math.round((state.completed.length/CARDS_DATA.length)*100);

  return <div style={{padding:"0 16px 100px",animation:"fadeSlideUp 0.4s ease"}}>
    <div style={{textAlign:"center",padding:"24px 0 20px"}}>
      <h1 style={{fontSize:28,color:"#F0E8D4",fontFamily:"'Cormorant Garamond',Georgia,serif",fontWeight:700,margin:"0 0 4px",letterSpacing:1}}>Veritas</h1>
      <p style={{fontSize:13,color:"#8A7E6E",fontFamily:"Georgia,serif",margin:0,fontStyle:"italic"}}>Catholic Apologetics</p>
    </div>
    <div onClick={()=>{setActiveCard(dailyCard);setScreen("card")}} style={{background:"linear-gradient(135deg,rgba(212,168,67,0.12),rgba(212,168,67,0.04))",border:"1px solid rgba(212,168,67,0.25)",borderRadius:16,padding:20,marginBottom:20,cursor:"pointer",boxShadow:"0 4px 20px rgba(0,0,0,0.2)"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <span style={{fontSize:10,color:"#D4A843",letterSpacing:2,fontFamily:"'Cormorant Garamond',Georgia,serif",fontWeight:600}}>DAILY CHALLENGE</span>
        {state.dailyDone&&state.lastDate===today?<span style={{fontSize:10,color:"#5AAF6A",fontFamily:"Georgia,serif"}}>✓ Complete</span>:<span style={{fontSize:10,color:"#E8873A",fontFamily:"Georgia,serif"}}>+{dailyCard.pts*2} bonus halos</span>}
      </div>
      <h3 style={{fontSize:18,color:"#F0E8D4",fontFamily:"'Cormorant Garamond',Georgia,serif",fontWeight:600,margin:"0 0 6px"}}>{dailyCard.t}</h3>
      <p style={{fontSize:13,color:"#8A7E6E",fontFamily:"Georgia,serif",margin:0,lineHeight:1.5}}>{dailyCard.obj.substring(0,80)}...</p>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:24}}>
      {[{label:"Halos",value:state.xp,icon:<HaloIcon size={18}/>},{label:"Streak",value:`${state.streak}d`,icon:<span style={{fontSize:16}}>🔥</span>},{label:"Mastered",value:`${totalPct}%`,icon:<span style={{fontSize:16}}>✓</span>}].map(s=><div key={s.label} style={{background:"rgba(42,36,30,0.6)",border:"1px solid rgba(212,168,67,0.1)",borderRadius:12,padding:"14px 10px",textAlign:"center"}}><div style={{marginBottom:4}}>{s.icon}</div><div style={{fontSize:20,color:"#F0E8D4",fontWeight:700,fontFamily:"Georgia,serif"}}>{s.value}</div><div style={{fontSize:10,color:"#6B5E4E",fontFamily:"'Cormorant Garamond',Georgia,serif",letterSpacing:1}}>{s.label}</div></div>)}
    </div>
    <div style={{marginBottom:20}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <h3 style={{fontSize:14,color:"#C4B896",fontFamily:"'Cormorant Garamond',Georgia,serif",letterSpacing:1,margin:0}}>CATEGORIES</h3>
        <button onClick={()=>setScreen("categories")} style={{background:"none",border:"none",color:"#D4A843",fontSize:12,fontFamily:"Georgia,serif",cursor:"pointer"}}>View all →</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        {Object.entries(cats).slice(0,4).map(([cat,info])=><div key={cat} onClick={()=>setScreen("categories")} style={{background:"rgba(42,36,30,0.5)",border:`1px solid ${CAT_COLORS[cat]}33`,borderRadius:12,padding:14,cursor:"pointer"}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}><span style={{fontSize:18,color:CAT_COLORS[cat]}}>{CAT_ICONS[cat]}</span><span style={{fontSize:12,color:"#C4B896",fontFamily:"'Cormorant Garamond',Georgia,serif",fontWeight:600}}>{cat.length>16?cat.substring(0,14)+"...":cat}</span></div>
          <div style={{height:3,background:"rgba(212,168,67,0.1)",borderRadius:2,overflow:"hidden"}}><div style={{height:"100%",width:`${info.total>0?(info.done/info.total)*100:0}%`,background:CAT_COLORS[cat],borderRadius:2}}/></div>
          <div style={{fontSize:10,color:"#6B5E4E",marginTop:4,fontFamily:"Georgia,serif"}}>{info.done}/{info.total} mastered</div>
        </div>)}
      </div>
    </div>
    <h3 style={{fontSize:14,color:"#C4B896",fontFamily:"'Cormorant Garamond',Georgia,serif",letterSpacing:1,marginBottom:12}}>CONTINUE STUDYING</h3>
    {CARDS_DATA.filter(c=>!state.completed.includes(c.id)).slice(0,3).map(card=><div key={card.id} onClick={()=>{setActiveCard(card);setScreen("card")}} style={{background:"rgba(42,36,30,0.4)",border:"1px solid rgba(212,168,67,0.08)",borderRadius:12,padding:"14px 16px",marginBottom:8,cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <div style={{flex:1}}><div style={{fontSize:14,color:"#F0E8D4",fontFamily:"'Cormorant Garamond',Georgia,serif",fontWeight:600}}>{card.t}</div><div style={{fontSize:11,color:"#6B5E4E",fontFamily:"Georgia,serif",marginTop:2}}>{card.cat} • {DIFF_LABELS[card.diff]}</div></div>
      <span style={{color:"#D4A843",fontSize:12,fontFamily:"Georgia,serif"}}>+{card.pts}</span>
    </div>)}
  </div>
}

function CategoriesScreen({state,setScreen,setActiveCard}){
  const cats=useMemo(()=>{const m={};CARDS_DATA.forEach(c=>{if(!m[c.cat])m[c.cat]={total:0,done:0,cards:[]};m[c.cat].total++;m[c.cat].cards.push(c);if(state.completed.includes(c.id))m[c.cat].done++});return m},[state.completed]);
  const[openCat,setOpenCat]=useState(null);
  const[tagFilter,setTagFilter]=useState(null);
  const filtered=openCat?(tagFilter?cats[openCat].cards.filter(c=>c.tags.includes(tagFilter)):cats[openCat].cards):[];

  if(openCat) return <div style={{padding:"0 16px 100px",animation:"fadeSlideUp 0.3s ease"}}>
    <button onClick={()=>{setOpenCat(null);setTagFilter(null)}} style={{background:"none",border:"none",color:"#D4A843",fontSize:14,fontFamily:"'Cormorant Garamond',Georgia,serif",cursor:"pointer",padding:"14px 0"}}>← Categories</button>
    <h2 style={{fontSize:22,color:"#F0E8D4",fontFamily:"'Cormorant Garamond',Georgia,serif",margin:"0 0 12px"}}><span style={{color:CAT_COLORS[openCat],marginRight:8}}>{CAT_ICONS[openCat]}</span>{openCat}</h2>
    <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:16}}>
      <button onClick={()=>setTagFilter(null)} style={{padding:"5px 12px",borderRadius:16,border:"1px solid rgba(212,168,67,0.3)",background:!tagFilter?"rgba(212,168,67,0.2)":"transparent",color:!tagFilter?"#D4A843":"#6B5E4E",fontSize:11,cursor:"pointer",fontFamily:"Georgia,serif"}}>All</button>
      {[...new Set(cats[openCat].cards.flatMap(c=>c.tags))].sort().map(tag=><button key={tag} onClick={()=>setTagFilter(tag===tagFilter?null:tag)} style={{padding:"5px 12px",borderRadius:16,border:"1px solid rgba(212,168,67,0.2)",background:tag===tagFilter?"rgba(212,168,67,0.2)":"transparent",color:tag===tagFilter?"#D4A843":"#6B5E4E",fontSize:11,cursor:"pointer",fontFamily:"Georgia,serif",whiteSpace:"nowrap"}}>{tag}</button>)}
    </div>
    {filtered.map(card=><div key={card.id} onClick={()=>{setActiveCard(card);setScreen("card")}} style={{background:"rgba(42,36,30,0.4)",border:"1px solid rgba(212,168,67,0.08)",borderRadius:12,padding:"14px 16px",marginBottom:8,cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <div style={{flex:1}}><div style={{display:"flex",alignItems:"center",gap:8}}><div style={{fontSize:14,color:"#F0E8D4",fontFamily:"'Cormorant Garamond',Georgia,serif",fontWeight:600}}>{card.t}</div>{state.completed.includes(card.id)&&<span style={{color:"#5AAF6A",fontSize:12}}>✓</span>}</div><div style={{fontSize:11,color:"#6B5E4E",fontFamily:"Georgia,serif",marginTop:4}}>{DIFF_LABELS[card.diff]} • {card.tier} • {card.pts} halos</div></div>
      <span style={{color:"#4A433A",fontSize:16}}>›</span>
    </div>)}
    <div style={{textAlign:"center",padding:20,color:"#4A433A",fontSize:12,fontFamily:"Georgia,serif"}}>{filtered.length} cards</div>
  </div>;

  return <div style={{padding:"0 16px 100px",animation:"fadeSlideUp 0.3s ease"}}>
    <h2 style={{fontSize:22,color:"#F0E8D4",fontFamily:"'Cormorant Garamond',Georgia,serif",padding:"20px 0 16px",margin:0}}>Browse Categories</h2>
    {Object.entries(cats).sort((a,b)=>b[1].total-a[1].total).map(([cat,info])=><div key={cat} onClick={()=>setOpenCat(cat)} style={{background:"rgba(42,36,30,0.5)",border:`1px solid ${CAT_COLORS[cat]}22`,borderRadius:14,padding:18,marginBottom:10,cursor:"pointer"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <span style={{fontSize:28,color:CAT_COLORS[cat],width:44,height:44,display:"flex",alignItems:"center",justifyContent:"center",background:`${CAT_COLORS[cat]}15`,borderRadius:12}}>{CAT_ICONS[cat]}</span>
          <div><div style={{fontSize:16,color:"#F0E8D4",fontFamily:"'Cormorant Garamond',Georgia,serif",fontWeight:600}}>{cat}</div><div style={{fontSize:12,color:"#6B5E4E",fontFamily:"Georgia,serif",marginTop:2}}>{info.total} cards • {info.done} mastered</div></div>
        </div>
        <span style={{color:"#4A433A",fontSize:20}}>›</span>
      </div>
      <div style={{height:4,background:"rgba(212,168,67,0.08)",borderRadius:2,marginTop:12,overflow:"hidden"}}><div style={{height:"100%",width:`${info.total>0?(info.done/info.total)*100:0}%`,background:`linear-gradient(90deg,${CAT_COLORS[cat]},${CAT_COLORS[cat]}AA)`,borderRadius:2}}/></div>
    </div>)}
  </div>
}

function SearchScreen({state,setScreen,setActiveCard}){
  const[query,setQuery]=useState("");
  const[tagFilter,setTagFilter]=useState(null);
  const results=useMemo(()=>{let f=CARDS_DATA;if(tagFilter)f=f.filter(c=>c.tags.includes(tagFilter));if(!query.trim())return f.slice(0,10);const q=query.toLowerCase();return f.filter(c=>c.t.toLowerCase().includes(q)||c.obj.toLowerCase().includes(q)||c.t2s.toLowerCase().includes(q)||c.cat.toLowerCase().includes(q)||c.tags.some(t=>t.toLowerCase().includes(q)))},[query,tagFilter]);

  return <div style={{padding:"0 16px 100px"}}>
    <h2 style={{fontSize:22,color:"#F0E8D4",fontFamily:"'Cormorant Garamond',Georgia,serif",padding:"20px 0 12px",margin:0}}>Quick Reference</h2>
    <div style={{background:"rgba(42,36,30,0.6)",border:"1px solid rgba(212,168,67,0.15)",borderRadius:12,padding:"0 14px",marginBottom:12,display:"flex",alignItems:"center"}}>
      <span style={{color:"#6B5E4E",fontSize:18,marginRight:8}}>⌕</span>
      <input value={query} onChange={e=>setQuery(e.target.value)} placeholder="Search objections, topics, verses..." style={{background:"none",border:"none",outline:"none",color:"#F0E8D4",fontSize:15,fontFamily:"Georgia,serif",padding:"14px 0",width:"100%"}}/>
      {query&&<button onClick={()=>setQuery("")} style={{background:"none",border:"none",color:"#6B5E4E",fontSize:18,cursor:"pointer"}}>✕</button>}
    </div>
    <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:16}}>
      <button onClick={()=>setTagFilter(null)} style={{padding:"5px 12px",borderRadius:16,border:"1px solid rgba(212,168,67,0.3)",background:!tagFilter?"rgba(212,168,67,0.2)":"transparent",color:!tagFilter?"#D4A843":"#6B5E4E",fontSize:11,cursor:"pointer",fontFamily:"Georgia,serif"}}>All</button>
      {["Protestant","Evangelical","Baptist","Reformed","JW","Muslim","Secular"].map(tag=><button key={tag} onClick={()=>setTagFilter(tag===tagFilter?null:tag)} style={{padding:"5px 12px",borderRadius:16,border:"1px solid rgba(212,168,67,0.2)",background:tag===tagFilter?"rgba(212,168,67,0.2)":"transparent",color:tag===tagFilter?"#D4A843":"#6B5E4E",fontSize:11,cursor:"pointer",fontFamily:"Georgia,serif"}}>{tag}</button>)}
    </div>
    <div style={{fontSize:11,color:"#6B5E4E",marginBottom:10,fontFamily:"Georgia,serif"}}>{results.length} result{results.length!==1?"s":""}</div>
    {results.map(card=><div key={card.id} onClick={()=>{setActiveCard(card);setScreen("card")}} style={{background:"rgba(42,36,30,0.4)",border:"1px solid rgba(212,168,67,0.08)",borderRadius:12,padding:"14px 16px",marginBottom:8,cursor:"pointer"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}><div style={{flex:1}}>
        <div style={{fontSize:14,color:"#F0E8D4",fontFamily:"'Cormorant Garamond',Georgia,serif",fontWeight:600}}>{card.t}</div>
        <div style={{fontSize:12,color:"#8A7E6E",fontFamily:"Georgia,serif",marginTop:4,lineHeight:1.4}}>{card.obj.substring(0,70)}...</div>
        <div style={{display:"flex",gap:6,marginTop:6,flexWrap:"wrap"}}>
          <span style={{fontSize:9,padding:"2px 8px",borderRadius:10,background:`${CAT_COLORS[card.cat]}22`,color:CAT_COLORS[card.cat],fontFamily:"Georgia,serif"}}>{card.cat}</span>
          {card.tags.slice(0,2).map(t=><span key={t} style={{fontSize:9,padding:"2px 8px",borderRadius:10,border:"1px solid rgba(138,126,110,0.2)",color:"#6B5E4E",fontFamily:"Georgia,serif"}}>{t}</span>)}
        </div>
      </div>{state.completed.includes(card.id)&&<span style={{color:"#5AAF6A",fontSize:14,marginLeft:8}}>✓</span>}</div>
    </div>)}
  </div>
}

function ProfileScreen({state,setState}){
  const lvl=getLevel(state.xp);const pct=Math.min(((state.xp-XP_THRESHOLDS[lvl.level])/(lvl.next-XP_THRESHOLDS[lvl.level]))*100,100);
  const catStats=useMemo(()=>{const m={};CARDS_DATA.forEach(c=>{if(!m[c.cat])m[c.cat]={total:0,done:0};m[c.cat].total++;if(state.completed.includes(c.id))m[c.cat].done++});return m},[state.completed]);

  return <div style={{padding:"0 16px 100px"}}>
    <div style={{textAlign:"center",padding:"30px 0 24px"}}>
      <div style={{width:80,height:80,borderRadius:"50%",margin:"0 auto 12px",background:"linear-gradient(135deg,rgba(212,168,67,0.2),rgba(212,168,67,0.05))",border:"2px solid rgba(212,168,67,0.3)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:36}}><HaloIcon size={40} color="#D4A843"/></div>
      <h2 style={{fontSize:26,color:"#F0E8D4",fontFamily:"'Cormorant Garamond',Georgia,serif",margin:"0 0 4px"}}>{lvl.name}</h2>
      <p style={{fontSize:13,color:"#8A7E6E",fontFamily:"Georgia,serif",margin:0}}>Level {lvl.level}</p>
    </div>
    <div style={{background:"rgba(42,36,30,0.6)",borderRadius:14,padding:16,marginBottom:16,border:"1px solid rgba(212,168,67,0.1)"}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><span style={{fontSize:12,color:"#C4B896",fontFamily:"Georgia,serif"}}>{state.xp} / {lvl.next} halos</span><span style={{fontSize:12,color:"#D4A843",fontFamily:"Georgia,serif"}}>{Math.round(pct)}%</span></div>
      <div style={{height:8,background:"rgba(212,168,67,0.1)",borderRadius:4,overflow:"hidden"}}><div style={{height:"100%",width:`${pct}%`,background:"linear-gradient(90deg,#D4A843,#E8C860)",borderRadius:4,transition:"width 0.5s"}}/></div>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:24}}>
      {[{l:"Cards Mastered",v:state.completed.length},{l:"Day Streak",v:state.streak},{l:"Total Halos",v:state.xp},{l:"Favorites",v:state.favorites.length}].map(s=><div key={s.l} style={{background:"rgba(42,36,30,0.5)",borderRadius:12,padding:16,textAlign:"center",border:"1px solid rgba(212,168,67,0.08)"}}><div style={{fontSize:24,color:"#F0E8D4",fontWeight:700,fontFamily:"Georgia,serif"}}>{s.v}</div><div style={{fontSize:11,color:"#6B5E4E",fontFamily:"'Cormorant Garamond',Georgia,serif",letterSpacing:0.5}}>{s.l}</div></div>)}
    </div>
    <h3 style={{fontSize:14,color:"#C4B896",fontFamily:"'Cormorant Garamond',Georgia,serif",letterSpacing:1,marginBottom:12}}>PROGRESS BY CATEGORY</h3>
    {Object.entries(catStats).sort((a,b)=>b[1].total-a[1].total).map(([cat,info])=><div key={cat} style={{marginBottom:12}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{fontSize:13,color:"#C4B896",fontFamily:"Georgia,serif"}}>{CAT_ICONS[cat]} {cat}</span><span style={{fontSize:11,color:"#6B5E4E",fontFamily:"Georgia,serif"}}>{info.done}/{info.total}</span></div>
      <div style={{height:6,background:"rgba(212,168,67,0.08)",borderRadius:3,overflow:"hidden"}}><div style={{height:"100%",width:`${info.total>0?(info.done/info.total)*100:0}%`,background:CAT_COLORS[cat],borderRadius:3}}/></div>
    </div>)}
    {state.favorites.length>0&&<><h3 style={{fontSize:14,color:"#C4B896",fontFamily:"'Cormorant Garamond',Georgia,serif",letterSpacing:1,margin:"24px 0 12px"}}>FAVORITES</h3>{CARDS_DATA.filter(c=>state.favorites.includes(c.id)).map(c=><div key={c.id} style={{background:"rgba(42,36,30,0.4)",borderRadius:10,padding:"10px 14px",marginBottom:6,fontSize:13,color:"#C4B896",fontFamily:"Georgia,serif"}}>★ {c.t}</div>)}</>}
    <button onClick={()=>setState({xp:0,streak:0,lastDate:null,completed:[],favorites:[],dailyDone:false})} style={{display:"block",margin:"30px auto 0",background:"none",border:"1px solid rgba(184,74,74,0.3)",borderRadius:10,padding:"10px 24px",color:"#B84A4A",fontSize:12,fontFamily:"Georgia,serif",cursor:"pointer"}}>Reset Progress</button>
  </div>
}

function App(){
  const[state,setStateRaw]=useState(loadState);
  const[screen,setScreen]=useState("home");
  const[activeCard,setActiveCard]=useState(null);
  const setState=useCallback((ns)=>{const s=typeof ns==="function"?ns(state):ns;setStateRaw(s);saveState(s)},[state]);

  useEffect(()=>{const today=new Date().toDateString();const yesterday=new Date(Date.now()-86400000).toDateString();if(state.lastDate&&state.lastDate!==today&&state.lastDate!==yesterday){setState(s=>({...s,streak:0}))}},[]);

  const handleComplete=useCallback((card)=>{const today=new Date().toDateString();setState(s=>{if(s.completed.includes(card.id))return s;const yesterday=new Date(Date.now()-86400000).toDateString();let ns=s.streak;if(s.lastDate!==today){ns=s.lastDate===yesterday?s.streak+1:1}return{...s,xp:s.xp+card.pts,completed:[...s.completed,card.id],streak:ns,lastDate:today,dailyDone:true}})},[setState]);
  const toggleFav=useCallback(id=>{setState(s=>({...s,favorites:s.favorites.includes(id)?s.favorites.filter(f=>f!==id):[...s.favorites,id]}))},[setState]);

  return <div style={{maxWidth:430,margin:"0 auto",minHeight:"100vh",background:"#12100D",color:"#F0E8D4",fontFamily:"Georgia,serif",position:"relative"}}>
    {screen!=="card"&&<TopBar xp={state.xp} streak={state.streak}/>}
    {screen==="home"&&<HomeScreen state={state} setScreen={setScreen} setActiveCard={setActiveCard}/>}
    {screen==="categories"&&<CategoriesScreen state={state} setScreen={setScreen} setActiveCard={setActiveCard}/>}
    {screen==="search"&&<SearchScreen state={state} setScreen={setScreen} setActiveCard={setActiveCard}/>}
    {screen==="profile"&&<ProfileScreen state={state} setState={setState}/>}
    {screen==="card"&&activeCard&&<CardViewer card={activeCard} onBack={()=>setScreen("home")} onComplete={handleComplete} isCompleted={state.completed.includes(activeCard.id)} isFav={state.favorites.includes(activeCard.id)} onToggleFav={toggleFav}/>}
    {screen!=="card"&&<NavBar screen={screen} setScreen={setScreen}/>}
  </div>
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
